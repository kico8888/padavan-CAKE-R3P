name: Build Padavan-CAKE MI-R3P

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential gperf bison flex gettext \
          autoconf automake libtool pkg-config git python3 libncurses5-dev \
          libssl-dev zlib1g-dev

    - name: Prepare Toolchain
      run: |
        mkdir -p toolchain
        git clone https://github.com/tw641/padavan-toolchain.git toolchain

    - name: Apply CAKE Patch
      run: |
        cp -r trunk/user/patches/CAKE/* trunk/

    - name: Build MI-R3P
      run: |
        cd trunk
        fakeroot ./build_firmware.sh MI-R3P

    - name: Upload Firmware
      uses: actions/upload-artifact@v5
      with:
        name: MI-R3P-CAKE
        path: trunk/images/*.trx
