name: Build Padavan MI-R3P 4.4 zh-TW

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Clone Padavan 4.4 Builder (修補版)
      run: |
        git clone https://github.com/hanwckf/padavan-4.4-builder.git padavan

    - name: Copy zh-TW locale
      run: |
        mkdir -p padavan/trunk/user/www/locale/zh-TW/
        cp zh-TW/* padavan/trunk/user/www/locale/zh-TW/

    - name: Build firmware (MI-R3P)
      run: |
        cd padavan/trunk
        fakeroot ./build_firmware MI-R3P

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: MI-R3P_4.4_zh-TW
        path: padavan/trunk/images/*.trx
