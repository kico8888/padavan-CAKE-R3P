name: Build Padavan MI-R3P 4.4 zh-TW

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Clone Padavan 4.4 legacy (MI-R3P supported)
      run: |
        git clone https://github.com/padavan-build/padavan-4.4-legacy.git padavan
        ls -al padavan/trunk/configs/templates

    - name: Copy zh-TW locale into Padavan source
      run: |
        mkdir -p padavan/trunk/user/www/locale/zh-TW/
        cp zh-TW/* padavan/trunk/user/www/locale/zh-TW/

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential gawk git gettext \
          libncurses5-dev libssl-dev xsltproc libxml2-utils python3 flex bison

    - name: Clone toolchain
      run: |
        git clone https://github.com/padavan-build/padavan-toolchain.git toolchain

    - name: Build firmware (MI-R3P, Linux 4.4)
      run: |
        export PATH=$PATH:$GITHUB_WORKSPACE/toolchain/bin
        cd padavan/trunk
        fakeroot ./build_firmware MI-R3P

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: MI-R3P_4.4_zh-TW
        path: padavan/trunk/images/*.trx
