name: Build Padavan-CAKE MI-R3P

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential gperf bison flex gettext \
          autoconf automake libtool pkg-config git python3 libncurses5-dev \
          libssl-dev zlib1g-dev

    - name: Clone Padavan-CAKE
      run: |
        git clone https://github.com/hanwckf/padavan-4.4.git
        cd padavan-4.4
        git checkout main

    - name: Copy MI-R3P Config
      run: |
        cp MI-R3P.config padavan-4.4/trunk/configs/templates/MI-R3P.config

    - name: Build Firmware
      run: |
        cd padavan-4.4/trunk
        fakeroot ./build_firmware.sh MI-R3P

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: MI-R3P-firmware
        path: padavan-4.4/trunk/images/*.trx
