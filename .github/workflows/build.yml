name: Build Padavan MI-R3P 4.4 zh-TW (Docker Safe)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo (host)
      uses: actions/checkout@v4

    - name: Build Padavan inside Docker
      run: |
        docker build -t padavan-builder .
        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          padavan-builder \
          bash -c "
            cd /workspace
            git clone https://github.com/hanwckf/padavan-4.4.git padavan
            mkdir -p padavan/trunk/user/www/locale/zh-TW/
            cp zh-TW/* padavan/trunk/user/www/locale/zh-TW/
            git clone https://github.com/hanwckf/padavan-toolchain.git toolchain
            export PATH=\$PATH:/workspace/toolchain/bin
            cd padavan/trunk
            fakeroot ./build_firmware MI-R3P
          "

    - name: Upload firmware (host)
      uses: actions/upload-artifact@v4
      with:
        name: MI-R3P_4.4_zh-TW
        path: padavan/trunk/images/*.trx
