name: Build Padavan MI-R3P 099 zh-TW

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Clone Padavan 4.4 source (099 compatible)
      run: |
        git clone https://github.com/hanwckf/padavan-4.4.git padavan
        ls -al padavan/trunk

    - name: Copy your config + locale into Padavan source
      run: |
        mkdir -p padavan/trunk/user/www/locale/zh-TW/
        cp zh-TW/* padavan/trunk/user/www/locale/zh-TW/
        cp MI-R3P_3.4.3.9-099.config padavan/trunk/configs/templates/

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential gawk git gettext \
          libncurses5-dev libssl-dev xsltproc libxml2-utils python3

    - name: Clone toolchain
      run: |
        git clone https://github.com/hanwckf/padavan-toolchain.git toolchain

    - name: Build firmware
      run: |
        export PATH=$PATH:$GITHUB_WORKSPACE/toolchain/bin
        cd padavan/trunk
        ls -al
        fakeroot ./build_firmware.sh MI-R3P_3.4.3.9-099.config

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: MI-R3P_099_zh-TW
        path: padavan/trunk/images/*.trx
